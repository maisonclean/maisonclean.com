<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CleanPro — Agendamento</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>

<!-- Firebase -->
<script type="module">
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged }            from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getDatabase, ref, onValue,
         push, set, update, remove }              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ══════════════════════════════════════════════════
// npm install firebase
// ══════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyDmHACYiA3-15z7nNjfvnLtjHcwU73GHSU",
  authDomain:        "maison-clean-a99a2.firebaseapp.com",
  databaseURL:       "https://maison-clean-a99a2-default-rtdb.firebaseio.com",
  projectId:         "maison-clean-a99a2",
  storageBucket:     "maison-clean-a99a2.firebasestorage.app",
  messagingSenderId: "911664317476",
  appId:             "1:911664317476:web:702b2ce6acd3440753c4b1",
};
// ══════════════════════════════════════════════════

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

// Perfis por e-mail — ajuste para os seus e-mails
const PERFIS = {
  "admin@maison.com":   { role: "admin",   nome: "Administrador" },
  "op@joinville.com": { role: "tecnico", nome: "Técnico" },
};

const SERVICOS = [
  { id:"hig",     label:"Higienização" },
  { id:"imp",     label:"Impermeabilização" },
  { id:"hig_imp", label:"Higienização + Impermeabilização" },
];
const ITENS = [
  { id:"sofa2",    label:"Sofá 2 Lugares",   ico:"🛋️" },
  { id:"sofa3",    label:"Sofá 3 Lugares",   ico:"🛋️" },
  { id:"sofa4",    label:"Sofá 4 Lugares",   ico:"🛋️" },
  { id:"sofaret",  label:"Sofá em L",    ico:"🛋️" },
  { id:"sofacanto",label:"Sofá de Canto",    ico:"🛋️" },
  { id:"csolt",    label:"Colchão Solteiro", ico:"🛏️" },
  { id:"ccasal",   label:"Colchão Casal",    ico:"🛏️" },
  { id:"cqueen",   label:"Colchão Queen",    ico:"🛏️" },
  { id:"cking",    label:"Colchão King",     ico:"🛏️" },
  { id:"cberco",   label:"Colchão Berço",    ico:"🛏️" },
  { id:"polt",     label:"Poltrona",         ico:"🪑" },
  { id:"cad",      label:"Cadeira",          ico:"🪑" },
  { id:"banvei",   label:"Banco Veicular",   ico:"🚗" },
  { id:"tappq",    label:"Tapete Pequeno",   ico:"🟫" },
  { id:"tapgd",    label:"Tapete Grande",    ico:"🟫" },
  { id:"cab",      label:"Cabeceira",        ico:"🛏️" },
  { id:"pre",      label:"Pre secagem",      ico:"☀️" },
];
const PAGAMENTOS = [
  { id:"dinheiro", label:"Dinheiro",          ico:"💵" },
  { id:"pix",      label:"Pix",               ico:"📱" },
  { id:"debito",   label:"Cartão de Débito",  ico:"💳" },
  { id:"credito",  label:"Cartão de Crédito", ico:"💳" },
  { id:"boleto",   label:"Boleto",            ico:"📄" },
];
const STATUS = {
  agendado:     { label:"Agendado",     color:"#3b82f6" },
  confirmado:   { label:"Confirmado",   color:"#f59e0b" },
  em_andamento: { label:"Em andamento", color:"#8b5cf6" },
  concluido:    { label:"Concluído",    color:"#10b981" },
  cancelado:    { label:"Cancelado",    color:"#ef4444" },
};

// ── Estado global ──────────────────────────────────
let usuario = null;
let clientes = [], agendamentos = [];
let abaAtual = "agenda";
let modalAgForm = null; // null | "novo" | objeto
let modalCliForm = null;
let itensForm = [];
let filtBusca = "", filtStatus = "", filtData = "";

// ── Firebase listeners ─────────────────────────────
function iniciarListeners() {
  onValue(ref(db, "clientes"), snap => {
    const v = snap.val();
    clientes = v ? Object.entries(v).map(([id,d]) => ({...d, _id:id})) : [];
    render();
  });
  onValue(ref(db, "agendamentos"), snap => {
    const v = snap.val();
    agendamentos = v ? Object.entries(v).map(([id,d]) => ({...d, _id:id})) : [];
    render();
  });
}

// ── Auth ───────────────────────────────────────────
onAuthStateChanged(auth, u => {
  if (u) {
    const p = PERFIS[u.email] || { role:"tecnico", nome: u.email };
    usuario = { email: u.email, ...p };
    abaAtual = p.role === "tecnico" ? "servicos" : "agenda";
    iniciarListeners();
  } else {
    usuario = null;
  }
  render();
});

async function login() {
  const email = document.getElementById("inp-email").value;
  const senha = document.getElementById("inp-senha").value;
  document.getElementById("login-erro").textContent = "";
  document.getElementById("btn-login").textContent = "Entrando...";
  try {
    await signInWithEmailAndPassword(auth, email, senha);
  } catch {
    document.getElementById("login-erro").textContent = "E-mail ou senha incorretos.";
    document.getElementById("btn-login").textContent = "Entrar";
  }
}
async function logout() { await signOut(auth); }

// ── CRUD ───────────────────────────────────────────
async function salvarAg(dados) {
  const { _id, ...d } = dados;
  if (_id) await update(ref(db, `agendamentos/${_id}`), d);
  else { const r = push(ref(db,"agendamentos")); await set(r, {...d, criadoEm: Date.now()}); }
  fecharModal();
}
async function removerAg(id) {
  if (!confirm("Remover agendamento?")) return;
  await remove(ref(db, `agendamentos/${id}`));
}
async function salvarCli(dados) {
  const { _id, ...d } = dados;
  if (_id) await update(ref(db, `clientes/${_id}`), d);
  else { const r = push(ref(db,"clientes")); await set(r, {...d, criadoEm: Date.now()}); }
  fecharModal();
}
async function removerCli(id) {
  if (!confirm("Remover cliente?")) return;
  await remove(ref(db, `clientes/${id}`));
}

// ── Utilidades ─────────────────────────────────────
const fmtMoeda = v => Number(v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const fmtData  = d => { if(!d) return "—"; const [y,m,dia]=d.split("-"); return `${dia}/${m}/${y}`; };
const esc      = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const badge    = s => { const st=STATUS[s]||{label:s,color:"#6b7280"}; return `<span class="badge" style="background:${st.color}22;color:${st.color};border:1px solid ${st.color}44">${st.label}</span>`; };

// ── Render principal ────────────────────────────────
function render() {
  document.getElementById("app").innerHTML = usuario ? renderApp() : renderLogin();
  bindEvents();
}

// ── LOGIN ──────────────────────────────────────────
function renderLogin() {
  return `
  <div class="login-wrap">
    <div class="login-box">
      <div class="login-logo">🧹</div>
      <h1 class="login-title">CleanPro</h1>
      <p class="login-sub">Sistema de Agendamento</p>
      <div class="field"><label>E-MAIL</label><input id="inp-email" type="email" placeholder="seu@email.com" onkeydown="if(event.key==='Enter')window._login()"/></div>
      <div class="field"><label>SENHA</label><input id="inp-senha" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')window._login()"/></div>
      <p id="login-erro" class="erro"></p>
      <button id="btn-login" class="btn-primary w100" onclick="window._login()">Entrar</button>
      <p class="login-foot">Dados protegidos via Firebase Auth</p>
    </div>
  </div>`;
}

// ── APP SHELL ──────────────────────────────────────
function renderApp() {
  const isTec = usuario.role === "tecnico";
  const abas  = isTec
    ? [{id:"servicos",label:"📋 Meus Serviços"}]
    : [{id:"agenda",label:"📅 Agenda"},{id:"clientes",label:"👥 Clientes"},{id:"dashboard",label:"📊 Dashboard"}];

  return `
  <div class="shell">
    <header class="topbar">
      <div class="topbar-left">
        <span class="logo-ico">🧹</span>
        <span class="logo-txt">CleanPro</span>
        <span class="badge-rt">🟢 TEMPO REAL</span>
      </div>
      <nav class="nav">
        ${abas.map(a=>`<button class="nav-btn ${abaAtual===a.id?"active":""}" onclick="window._aba('${a.id}')">${a.label}</button>`).join("")}
      </nav>
      <div class="topbar-right">
        <span class="user-label">${isTec?"🔧":"👑"} ${esc(usuario.nome)}</span>
        <button class="btn-ghost sm" onclick="window._logout()">Sair</button>
      </div>
    </header>
    <main class="main">
      ${abaAtual==="servicos" ? renderServicos() : ""}
      ${abaAtual==="agenda"   ? renderAgenda()   : ""}
      ${abaAtual==="clientes" ? renderClientes() : ""}
      ${abaAtual==="dashboard"? renderDash()     : ""}
    </main>
  </div>
  ${renderModais()}`;
}

// ── ABA SERVIÇOS (técnico) ─────────────────────────
function renderServicos() {
  const ags = agendamentos
    .filter(a => (!filtStatus||a.status===filtStatus) && (!filtData||a.data===filtData))
    .sort((a,b)=>(a.data+a.hora)<(b.data+b.hora)?1:-1);
  return `
  <div class="page-head">
    <h2>Serviços Agendados</h2>
  </div>
  <div class="filtros">
    <select class="inp" onchange="window._filtSt(this.value)">
      <option value="">Todos os status</option>
      ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${filtStatus===k?"selected":""}>${v.label}</option>`).join("")}
    </select>
    <input class="inp" type="date" value="${filtData}" onchange="window._filtData(this.value)"/>
  </div>
  <div class="lista">
    ${ags.length===0?`<p class="vazio">Nenhum serviço encontrado.</p>`:""}
    ${ags.map(ag=>cardServico(ag)).join("")}
  </div>`;
}

function cardServico(ag) {
  const itens = ag.itens||[];
  return `
  <div class="card">
    <div class="card-row">
      <div>
        <div class="card-badges">${badge(ag.status)} <span class="meta">📅 ${fmtData(ag.data)} às ${esc(ag.hora)}</span></div>
        <p class="card-title">${itens.map(i=>i.ico).join(" ")} ${itens.length} item(ns)</p>
        <p class="meta">📍 ${esc(ag.enderecoServico||"Endereço não informado")}</p>
      </div>
      <div class="card-right">
        <p class="valor">${fmtMoeda(ag.valorTotal)}</p>
        <button class="btn-ghost sm" onclick="this.closest('.card').querySelector('.card-detail').classList.toggle('hidden')">Ver serviços</button>
      </div>
    </div>
    <div class="card-detail hidden">
      <div class="divider"></div>
      ${itens.map(it=>`<div class="item-row">${it.ico} <span>${it.qtd}x ${esc(it.label)}</span> <span class="tag-blue">${esc(it.tipoLabel)}</span></div>`).join("")}
      ${ag.observacoes?`<p class="obs">💬 ${esc(ag.observacoes)}</p>`:""}
    </div>
  </div>`;
}

// ── ABA AGENDA (admin) ─────────────────────────────
function renderAgenda() {
  const ags = agendamentos.filter(a => {
    const cli = clientes.find(c=>c._id===a.clienteId);
    const bOk = !filtBusca||(cli?.nome||"").toLowerCase().includes(filtBusca.toLowerCase())||(a.enderecoServico||"").toLowerCase().includes(filtBusca.toLowerCase());
    return bOk && (!filtStatus||a.status===filtStatus) && (!filtData||a.data===filtData);
  }).sort((a,b)=>(a.data+a.hora)<(b.data+b.hora)?1:-1);

  return `
  <div class="page-head">
    <h2>Agendamentos</h2>
    <button class="btn-primary" onclick="window._novoAg()">+ Novo Agendamento</button>
  </div>
  <div class="filtros">
    <input class="inp" placeholder="🔍 Buscar cliente ou endereço..." value="${esc(filtBusca)}" oninput="window._filtBusca(this.value)"/>
    <select class="inp" onchange="window._filtSt(this.value)">
      <option value="">Todos os status</option>
      ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${filtStatus===k?"selected":""}>${v.label}</option>`).join("")}
    </select>
    <input class="inp" type="date" value="${filtData}" onchange="window._filtData(this.value)"/>
    ${(filtBusca||filtStatus||filtData)?`<button class="btn-ghost sm" onclick="window._limparFilt()">Limpar</button>`:""}
  </div>
  <div class="lista">
    ${ags.length===0?`<p class="vazio">Nenhum agendamento encontrado.</p>`:""}
    ${ags.map(ag=>{
      const cli = clientes.find(c=>c._id===ag.clienteId);
      const fp  = PAGAMENTOS.find(f=>f.id===ag.formaPagamento);
      const itens = ag.itens||[];
      return `
      <div class="card">
        <div class="card-row">
          <div style="flex:1">
            <div class="card-badges">${badge(ag.status)} <span class="meta">📅 ${fmtData(ag.data)} às ${esc(ag.hora)}</span></div>
            <p class="card-title">${esc(cli?.nome||"—")}</p>
            <p class="meta">📞 ${esc(cli?.telefone||"—")} · 📍 ${esc(ag.enderecoServico||"—")}</p>
            <div class="tags">
              ${itens.map(it=>`<span class="tag">${it.ico} ${it.qtd}x ${esc(it.label)} · ${esc(it.tipoLabel)}</span>`).join("")}
            </div>
          </div>
          <div class="card-right">
            <p class="valor">${fmtMoeda(ag.valorTotal)}</p>
            ${fp?`<p class="meta">${fp.ico} ${fp.label}</p>`:""}
            <div class="btn-group">
              <button class="btn-ghost sm" onclick="window._editarAg('${ag._id}')">✏️ Editar</button>
              <button class="btn-danger sm" onclick="window._remAg('${ag._id}')">🗑️</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

// ── ABA CLIENTES ───────────────────────────────────
function renderClientes() {
  const lista = clientes.filter(c=>!filtBusca||c.nome?.toLowerCase().includes(filtBusca.toLowerCase()));
  return `
  <div class="page-head">
    <h2>Clientes (${clientes.length})</h2>
    <button class="btn-primary" onclick="window._novoCli()">+ Novo Cliente</button>
  </div>
  <div class="filtros">
    <input class="inp" placeholder="🔍 Buscar..." value="${esc(filtBusca)}" oninput="window._filtBusca(this.value)" style="max-width:300px"/>
  </div>
  <div class="lista">
    ${lista.length===0?`<p class="vazio">Nenhum cliente cadastrado.</p>`:""}
    ${lista.map(c=>{
      const nAg  = agendamentos.filter(a=>a.clienteId===c._id).length;
      const tot  = agendamentos.filter(a=>a.clienteId===c._id&&a.status!=="cancelado").reduce((s,a)=>s+Number(a.valorTotal||0),0);
      return `
      <div class="card">
        <div class="card-row">
          <div>
            <p class="card-title">${esc(c.nome)}</p>
            <p class="meta">📞 ${esc(c.telefone)}${c.email?` · ✉️ ${esc(c.email)}`:""}</p>
            <p class="meta">📍 ${esc([c.endereco,c.bairro,c.cidade].filter(Boolean).join(" — "))}</p>
          </div>
          <div class="card-right" style="align-items:flex-end;gap:12px">
            <div style="display:flex;gap:20px">
              <div style="text-align:center">
                <p style="margin:0;font-weight:800;font-size:20px;color:#38bdf8">${nAg}</p>
                <p class="meta">agendamentos</p>
              </div>
              <div style="text-align:center">
                <p style="margin:0;font-weight:800;font-size:20px;color:#10b981">${fmtMoeda(tot)}</p>
                <p class="meta">faturado</p>
              </div>
            </div>
            <div class="btn-group">
              <button class="btn-ghost sm" onclick="window._editarCli('${c._id}')">✏️</button>
              <button class="btn-danger sm" onclick="window._remCli('${c._id}')">🗑️</button>
            </div>
          </div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

// ── ABA DASHBOARD ──────────────────────────────────
function renderDash() {
  const hoje    = new Date().toISOString().slice(0,10);
  const totalMes= agendamentos.filter(a=>a.data?.slice(0,7)===hoje.slice(0,7)&&a.status!=="cancelado").reduce((s,a)=>s+Number(a.valorTotal||0),0);
  const agHoje  = agendamentos.filter(a=>a.data===hoje).length;
  const pend    = agendamentos.filter(a=>["agendado","confirmado"].includes(a.status)).length;
  const cards   = [
    {label:"Faturamento do mês", valor:fmtMoeda(totalMes), ico:"💰", cor:"#10b981"},
    {label:"Serviços hoje",      valor:agHoje,             ico:"📅", cor:"#38bdf8"},
    {label:"Pendentes",          valor:pend,               ico:"⏳", cor:"#f59e0b"},
    {label:"Total clientes",     valor:clientes.length,    ico:"👥", cor:"#8b5cf6"},
  ];
  const cnt={};
  agendamentos.forEach(ag=>(ag.itens||[]).forEach(it=>{cnt[it.label]=(cnt[it.label]||0)+it.qtd;}));
  const top=Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max=top[0]?.[1]||1;

  return `
  <div class="page-head"><h2>Dashboard</h2></div>
  <div class="grid4">
    ${cards.map(s=>`
    <div class="card" style="text-align:center">
      <div style="font-size:32px;margin-bottom:8px">${s.ico}</div>
      <p style="margin:0 0 4px;font-size:28px;font-weight:800;color:${s.cor}">${s.valor}</p>
      <p class="meta">${s.label}</p>
    </div>`).join("")}
  </div>
  <h3 class="section-title">Por status</h3>
  <div class="grid5">
    ${Object.entries(STATUS).map(([k,v])=>`
    <div class="card" style="text-align:center">
      <p style="margin:0 0 6px;font-size:22px;font-weight:800;color:${v.color}">${agendamentos.filter(a=>a.status===k).length}</p>
      ${badge(k)}
    </div>`).join("")}
  </div>
  <h3 class="section-title">Itens mais higienizados</h3>
  <div class="card">
    ${top.length===0?`<p class="vazio">Sem dados ainda.</p>`:""}
    ${top.map(([label,n])=>`
    <div style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span style="font-size:13px;color:#f1f5f9">${esc(label)}</span>
        <span class="meta">${n}x</span>
      </div>
      <div style="background:#0f172a;border-radius:4px;height:6px">
        <div style="background:linear-gradient(90deg,#0ea5e9,#6366f1);border-radius:4px;height:6px;width:${Math.round((n/max)*100)}%"></div>
      </div>
    </div>`).join("")}
  </div>`;
}

// ── MODAIS ─────────────────────────────────────────
function renderModais() {
  if (!modalAgForm && !modalCliForm) return "";

  if (modalCliForm !== null) {
    const ed = typeof modalCliForm === "object";
    const d  = ed ? modalCliForm : {};
    return `
    <div class="overlay" onclick="if(event.target===this)window._fecharModal()">
      <div class="modal">
        <div class="modal-head"><h2>${ed?"Editar":"Novo"} Cliente</h2><button onclick="window._fecharModal()">✕</button></div>
        <div class="form-grid2">
          <div class="field"><label>NOME COMPLETO</label><input class="inp" id="c-nome" value="${esc(d.nome||"")}" placeholder="João Silva"/></div>
          <div class="field"><label>TELEFONE / WHATSAPP</label><input class="inp" id="c-tel" value="${esc(d.telefone||"")}" placeholder="(11) 99999-9999"/></div>
          <div class="field"><label>E-MAIL</label><input class="inp" id="c-email" value="${esc(d.email||"")}" placeholder="opcional"/></div>
          <div class="field"><label>CEP</label><input class="inp" id="c-cep" value="${esc(d.cep||"")}" placeholder="00000-000"/></div>
        </div>
        <div class="field"><label>ENDEREÇO</label><input class="inp" id="c-end" value="${esc(d.endereco||"")}" placeholder="Rua, número, complemento"/></div>
        <div class="form-grid2">
          <div class="field"><label>BAIRRO</label><input class="inp" id="c-bairro" value="${esc(d.bairro||"")}"/></div>
          <div class="field"><label>CIDADE</label><input class="inp" id="c-cidade" value="${esc(d.cidade||"")}"/></div>
        </div>
        <div class="field"><label>OBSERVAÇÕES</label><textarea class="inp" id="c-obs" rows="3">${esc(d.observacoes||"")}</textarea></div>
        <div class="modal-foot">
          <button class="btn-ghost" onclick="window._fecharModal()">Cancelar</button>
          <button class="btn-primary" onclick="window._salvarCli('${ed?d._id:""}')">Salvar Cliente</button>
        </div>
      </div>
    </div>`;
  }

  // Modal Agendamento
  const ed = typeof modalAgForm === "object";
  const d  = ed ? modalAgForm : {};
  const its= itensForm;

  return `
  <div class="overlay" onclick="if(event.target===this)window._fecharModal()">
    <div class="modal">
      <div class="modal-head"><h2>${ed?"Editar":"Novo"} Agendamento</h2><button onclick="window._fecharModal()">✕</button></div>
      <div class="form-grid2">
        <div class="field"><label>CLIENTE</label>
          <select class="inp" id="ag-cli" onchange="window._autoEnd(this.value)">
            <option value="">Selecionar...</option>
            ${clientes.map(c=>`<option value="${c._id}" ${d.clienteId===c._id?"selected":""}>${esc(c.nome)}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>STATUS</label>
          <select class="inp" id="ag-status">
            ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${(d.status||"agendado")===k?"selected":""}>${v.label}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>DATA</label><input class="inp" id="ag-data" type="date" value="${esc(d.data||"")}"/></div>
        <div class="field"><label>HORA</label><input class="inp" id="ag-hora" type="time" value="${esc(d.hora||"")}"/></div>
      </div>
      <div class="field"><label>ENDEREÇO DO SERVIÇO</label><input class="inp" id="ag-end" value="${esc(d.enderecoServico||"")}" placeholder="Rua, número, bairro, cidade"/></div>

      <div class="add-item-box">
        <p class="add-item-title">ADICIONAR ITENS</p>
        <div class="add-item-row">
          <div class="field" style="flex:2"><label>ITEM</label>
            <select class="inp" id="sel-item">
              ${ITENS.map(i=>`<option value="${i.id}">${i.ico} ${i.label}</option>`).join("")}
            </select>
          </div>
          <div class="field" style="flex:2"><label>TIPO</label>
            <select class="inp" id="sel-tipo">
              ${SERVICOS.map(s=>`<option value="${s.id}">${s.label}</option>`).join("")}
            </select>
          </div>
          <div class="field" style="flex:1"><label>QTD</label><input class="inp" id="sel-qtd" type="number" min="1" value="1"/></div>
          <button class="btn-primary" style="height:40px;align-self:flex-end" onclick="window._addItem()">+ Add</button>
        </div>
        <div id="itens-lista">
          ${its.map((it,i)=>`
          <div class="item-added">
            <span>${it.ico} ${it.qtd}x ${esc(it.label)} — <span style="color:#38bdf8">${esc(it.tipoLabel)}</span></span>
            <button onclick="window._remItem(${i})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:16px">✕</button>
          </div>`).join("")}
        </div>
      </div>

      <div class="form-grid2">
        <div class="field"><label>FORMA DE PAGAMENTO</label>
          <select class="inp" id="ag-pag">
            ${PAGAMENTOS.map(p=>`<option value="${p.id}" ${(d.formaPagamento||"pix")===p.id?"selected":""}>${p.ico} ${p.label}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>VALOR TOTAL (R$)</label><input class="inp" id="ag-valor" type="number" step="0.01" value="${esc(d.valorTotal||"")}" placeholder="0,00"/></div>
      </div>
      <div class="field"><label>OBSERVAÇÕES</label><textarea class="inp" id="ag-obs" rows="3">${esc(d.observacoes||"")}</textarea></div>
      <div class="modal-foot">
        <button class="btn-ghost" onclick="window._fecharModal()">Cancelar</button>
        <button class="btn-primary" onclick="window._salvarAg('${ed?d._id:""}')">Salvar Agendamento</button>
      </div>
    </div>
  </div>`;
}

// ── Bind events (global) ───────────────────────────
function bindEvents() {
  window._login      = login;
  window._logout     = logout;
  window._aba        = a => { abaAtual=a; filtBusca=""; filtStatus=""; filtData=""; render(); };
  window._filtBusca  = v => { filtBusca=v; render(); };
  window._filtSt     = v => { filtStatus=v; render(); };
  window._filtData   = v => { filtData=v; render(); };
  window._limparFilt = () => { filtBusca=""; filtStatus=""; filtData=""; render(); };

  window._novoAg   = () => { modalAgForm="novo"; itensForm=[]; render(); };
  window._editarAg = id => { const ag=agendamentos.find(a=>a._id===id); if(ag){modalAgForm=ag; itensForm=[...(ag.itens||[])]; render();} };
  window._remAg    = id => removerAg(id);
  window._novoCli  = () => { modalCliForm="novo"; render(); };
  window._editarCli= id => { const c=clientes.find(x=>x._id===id); if(c){modalCliForm=c; render();} };
  window._remCli   = id => removerCli(id);
  window._fecharModal = fecharModal;

  window._autoEnd = cliId => {
    const c = clientes.find(x=>x._id===cliId);
    if(c) { const el=document.getElementById("ag-end"); if(el) el.value=[c.endereco,c.bairro,c.cidade].filter(Boolean).join(", "); }
  };

  window._addItem = () => {
    const itemId = document.getElementById("sel-item").value;
    const tipoId = document.getElementById("sel-tipo").value;
    const qtd    = Number(document.getElementById("sel-qtd").value)||1;
    const cat    = ITENS.find(i=>i.id===itemId);
    const tipo   = SERVICOS.find(s=>s.id===tipoId);
    itensForm.push({ id:Date.now(), itemId, label:cat.label, ico:cat.ico, tipoId, tipoLabel:tipo.label, qtd });
    render();
  };

  window._remItem = idx => { itensForm.splice(idx,1); render(); };

  window._salvarAg = async (fbId) => {
    const cliId = document.getElementById("ag-cli").value;
    const data  = document.getElementById("ag-data").value;
    const hora  = document.getElementById("ag-hora").value;
    if(!cliId||!data||!hora||!itensForm.length){ alert("Preencha cliente, data, hora e pelo menos 1 item."); return; }
    await salvarAg({
      _id: fbId||undefined,
      clienteId: cliId,
      data, hora,
      status:          document.getElementById("ag-status").value,
      enderecoServico: document.getElementById("ag-end").value,
      formaPagamento:  document.getElementById("ag-pag").value,
      valorTotal:      document.getElementById("ag-valor").value,
      observacoes:     document.getElementById("ag-obs").value,
      itens: itensForm,
    });
  };

  window._salvarCli = async (fbId) => {
    const nome = document.getElementById("c-nome").value;
    const tel  = document.getElementById("c-tel").value;
    if(!nome||!tel){ alert("Preencha nome e telefone."); return; }
    await salvarCli({
      _id: fbId||undefined,
      nome, telefone:tel,
      email:       document.getElementById("c-email").value,
      cep:         document.getElementById("c-cep").value,
      endereco:    document.getElementById("c-end").value,
      bairro:      document.getElementById("c-bairro").value,
      cidade:      document.getElementById("c-cidade").value,
      observacoes: document.getElementById("c-obs").value,
    });
  };
}

function fecharModal() { modalAgForm=null; modalCliForm=null; itensForm=[]; render(); }

render();
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:"DM Sans",sans-serif;min-height:100vh}
h1,h2,h3{font-family:"Syne",sans-serif}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.login-box{width:100%;max-width:380px;background:#1e293b;border:1px solid #334155;border-radius:16px;padding:36px 28px;display:flex;flex-direction:column;gap:16px}
.login-logo{font-size:48px;text-align:center}
.login-title{font-size:26px;font-weight:800;text-align:center;color:#f1f5f9}

/* SHELL */
.shell{min-height:100vh;display:flex;flex-direction:column}

.badge-rt{font-size:10px;background:#10b98122;color:#10b981;border:1px solid #10b98144;border-radius:10px;padding:2px 8px}
.nav{display:flex;gap:4px;flex-wrap:wrap}
.nav-btn{background:transparent;border:1px solid transparent;color:#64748b;border-radius:8px;padding:6px 14px;cursor:pointer;font-weight:600;font-size:13px;font-family:"DM Sans",sans-serif;transition:all .15s}
.nav-btn.active{background:#38bdf811;border-color:#38bdf833;color:#38bdf8}
.topbar-right{display:flex;align-items:center;gap:12px}
.user-label{color:#64748b;font-size:13px}
.main{max-width:1100px;margin:0 auto;padding:24px 16px;width:100%}

/* PÁGINA */
.page-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-head h2{font-size:20px;font-weight:700}
.section-title{margin:24px 0 12px;font-size:16px;color:#94a3b8}
.filtros{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.lista{display:flex;flex-direction:column;gap:12px}

/* CARD */
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px}

.card-badges{display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap}
.card-title{font-weight:700;font-size:16px;margin:2px 0}
.card-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;text-align:right}
.card-detail{margin-top:14px}

.item-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;font-size:14px;color:#f1f5f9}
.obs{color:#94a3b8;font-size:13px;background:#0f172a;padding:8px 12px;border-radius:8px;margin-top:10px}
.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{background:#0f172a;border:1px solid #334155;border-radius:6px;padding:3px 10px;font-size:12px;color:#94a3b8}
.tag-blue{color:#38bdf8;font-size:12px;background:#38bdf811;border-radius:4px;padding:2px 8px}
.btn-group{display:flex;gap:6px}

/* GRIDS */
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.grid5{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:24px}

/* BOTÕES */
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:8px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s}
.btn-ghost{background:transparent;color:#94a3b8;border:1px solid #334155;border-radius:8px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s}
.btn-danger{background:#ef444422;color:#ef4444;border:1px solid #ef444444;border-radius:8px;padding:10px 20px;font-weight:700;font-size:14px;cursor:pointer;font-family:"DM Sans",sans-serif;transition:opacity .15s}
.btn-primary:hover,.btn-ghost:hover,.btn-danger:hover{opacity:.8}
.sm{padding:6px 14px;font-size:12px}
.w100{width:100%}

/* CAMPOS */
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:12px;font-weight:600;color:#94a3b8;letter-spacing:.5px}
.inp{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:10px 12px;font-size:14px;outline:none;font-family:"DM Sans",sans-serif;transition:border .2s;width:100%}
.inp:focus{border-color:#38bdf8}

select.inp{cursor:pointer}

/* BADGE */

.valor{color:#10b981;font-weight:800;font-size:20px;margin:0}

/* MODAL */
.overlay{position:fixed;inset:0;background:#000b;z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#0f172a;border:1px solid #334155;border-radius:16px;padding:28px;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
.modal-head{display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:18px;color:#f1f5f9}
.modal-head button{background:none;border:none;color:#64748b;font-size:22px;cursor:pointer}
.modal-foot{display:flex;gap:10px;justify-content:flex-end;margin-top:4px}
.form-grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ADD ITEM */
.add-item-box{background:#0f172a;border-radius:10px;padding:14px;border:1px solid #1e293b;display:flex;flex-direction:column;gap:10px}
.add-item-title{font-size:12px;font-weight:700;color:#94a3b8;letter-spacing:.5px}

.hidden{display:none}

@media(max-width:600px){
  .form-grid2{grid-template-columns:1fr}
  .add-item-row{grid-template-columns:1fr 1fr}
  .topbar{height:auto;padding:10px 16px}
}

</head>
